name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: backend-production
  cancel-in-progress: true

env:
  DEPLOY_PATH: /home/ptpinstitute-api/htdocs/api.ptpinstitute.com/ptpi
  PORT: "22"

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Validate SSH configuration
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.HOST }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOST}" ]; then
            echo "::error::Missing required secret HOST. Set it to the VPS public IP or public DNS record."
            exit 1
          fi

          if [ -z "${SSH_KEY}" ]; then
            echo "::error::Missing required secret SSH_PRIVATE_KEY."
            exit 1
          fi

          echo "SSH target configured for ${DEPLOY_HOST}:${{ env.PORT }}"

      - name: Preflight SSH reachability
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.HOST }}
          DEPLOY_PORT: ${{ env.PORT }}
        run: |
          set -euo pipefail

          echo "Resolving ${DEPLOY_HOST}..."
          resolved_ips="$(getent ahosts "${DEPLOY_HOST}" | awk '{print $1}' | sort -u)"

          if [ -z "${resolved_ips}" ]; then
            echo "::error::Unable to resolve HOST='${DEPLOY_HOST}'. Use the VPS public IP or a public DNS record."
            exit 1
          fi

          echo "Resolved ${DEPLOY_HOST} to:"
          printf '%s\n' "${resolved_ips}"

          first_ip="$(printf '%s\n' "${resolved_ips}" | head -n 1)"
          case "${first_ip}" in
            10.*|127.*|172.1[6-9].*|172.2[0-9].*|172.3[0-1].*|192.168.*)
              echo "::warning::HOST resolves to private/internal IP ${first_ip}. GitHub-hosted runners usually cannot reach private addresses directly."
              ;;
          esac

          echo "Probing TCP connectivity to ${DEPLOY_HOST}:${DEPLOY_PORT}..."
          if ! timeout 10 bash -c ">/dev/tcp/${DEPLOY_HOST}/${DEPLOY_PORT}" 2>/dev/null; then
            echo "::error::GitHub runner cannot reach ${DEPLOY_HOST}:${DEPLOY_PORT}. Ensure sshd is running, listening publicly on port ${DEPLOY_PORT}, and that OS/provider firewalls allow inbound TCP ${DEPLOY_PORT}."
            {
              echo "## SSH Preflight Failed"
              echo
              echo "- Host: \`${DEPLOY_HOST}\`"
              echo "- Port: \`${DEPLOY_PORT}\`"
              echo "- Resolution: succeeded"
              echo "- TCP reachability: failed"
              echo
              echo "Checks to perform on the server:"
              echo "- Confirm \`sshd\` is running."
              echo "- Confirm SSH is listening on \`0.0.0.0:${DEPLOY_PORT}\` or the public interface."
              echo "- Open inbound TCP \`${DEPLOY_PORT}\` in OS and provider firewalls."
              echo "- Verify there is no NAT or allowlist blocking GitHub-hosted runners."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          echo "TCP port ${DEPLOY_PORT} is reachable from the GitHub runner."

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.HOST }}
          username: root
          port: ${{ env.PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_PATH }}"
            git pull --ff-only origin master

            if [ -x ".venv/bin/python" ]; then
              VENV_PATH=".venv"
            elif [ -x "venv/bin/python" ]; then
              VENV_PATH="venv"
            else
              python3 -m venv .venv
              VENV_PATH=".venv"
            fi

            PYTHON_BIN="${VENV_PATH}/bin/python"

            if [ ! -x "${PYTHON_BIN}" ]; then
              echo "Virtual environment is missing a Python executable at ${PYTHON_BIN}"
              exit 1
            fi

            "${PYTHON_BIN}" -m ensurepip --upgrade
            "${PYTHON_BIN}" -m pip install --upgrade pip setuptools wheel
            "${PYTHON_BIN}" -m pip install -r requirements.txt

            touch db.sqlite3
            chmod 664 db.sqlite3
            mkdir -p media backups staticfiles/static

            "${PYTHON_BIN}" manage.py migrate --noinput
            "${PYTHON_BIN}" manage.py collectstatic --noinput

            systemctl restart gunicorn
            systemctl status gunicorn --no-pager --lines=20

            echo "Backend restarted with gunicorn on http://127.0.0.1:8000"
